# Tennis pose transfer configuration for fs_vid2vid
image_save_iter: 5
snapshot_save_epoch: 2
snapshot_save_iter: 5
snapshot_save_start_iter: 0
snapshot_save_start_epoch: 0
logging_iter: 5
max_epoch: 10
single_frame_epoch: 0
num_epochs_temporal_step: 5

trainer:
    type: imaginaire.trainers.fs_vid2vid
    reuse_gen_output: False
    amp_config:
        enabled: False
    model_average_config:
        enabled: False
        beta: 0.9999
        start_iteration: 500
        num_batch_norm_estimation_iterations: 0
    num_videos_to_test: 4
    num_frames_per_video: 8
    gan_mode: hinge
    gan_relativistic: False
    perceptual_loss:
        mode: vgg19
        layers: [relu_1_1, relu_2_1, relu_3_1, relu_4_1, relu_5_1]
        weights: [0.03125, 0.0625, 0.125, 0.25, 1.0]
        num_scales: 3
    loss_weight:
        gan: 1.0
        feature_matching: 10.0
        temporal_gan: 0.0
        perceptual: 10.0
        flow: 10.0
    init:
        type: xavier
        gain: 0.02

gen_opt:
    type: adam
    lr: 0.0001
    adam_beta1: 0.0
    adam_beta2: 0.999
    lr_policy:
        iteration_mode: False
        type: step
        step_size: 5
        gamma: 0.5

dis_opt:
    type: adam
    lr: 0.0004
    adam_beta1: 0.0
    adam_beta2: 0.999
    lr_policy:
        iteration_mode: False
        type: step
        step_size: 5
        gamma: 0.5

gen:
    type: imaginaire.generators.fs_vid2vid
    num_filters: 32
    max_num_filters: 1024
    num_downsamples: 5
    activation_norm_type: spatially_adaptive
    activation_norm_params:
        activation_norm_type: instance
        num_filters: 0
        kernel_size: 1
    weight_norm_type: spectral
    hyper:
        is_hyper_spade: True
        is_hyper_embed: True
        is_hyper_conv: False
        kernel_size: 3
        num_hyper_layers: 4
        num_fc_layers: 2
        activation_norm_type: instance
        weight_norm_type: spectral
        method_to_use_ref_labels: mul
        attention:
            num_filters: 32
            num_downsamples: 2
    flow:
        warp_ref: True
        generate_raw_output: False
        num_filters: 32
        max_num_filters: 1024
        num_downsamples: 3
        num_res_blocks: 6
        activation_norm_type: instance
        weight_norm_type: spectral
        flow_output_multiplier: 20
        multi_spade_combine:
            num_layers: 2
            embed:
                arch: unet
                num_filters: 32
                num_downsamples: 5
                kernel_size: 3
                sep_warp_embed: True
                weight_norm_type: spectral
        sep_prev_flow: False
    embed:
        use_embed: True
        arch: encoderdecoder
        num_filters: 32
        num_downsamples: 5
        kernel_size: 3
        weight_norm_type: spectral

dis:
    type: imaginaire.discriminators.fs_vid2vid
    image:
        num_filters: 32
        max_num_filters: 512
        num_discriminators: 2
        num_layers: 4
        weight_norm_type: spectral
        activation_norm_type: instance

flow_network:
    type: imaginaire.third_party.flow_net.flow_net

data:
    name: tennis
    type: imaginaire.datasets.tennis_pose
    num_frames_G: 2
    num_frames_D: 2
    initial_few_shot_K: 1
    num_workers: 0
    has_foreground: True
    paired: True
    output_h_w: 512, 512
    input_types:
        - crops:
            ext: png
            num_channels: 3
            normalize: True
        - poses:
            ext: png
            num_channels: 3
            is_mask: True
            normalize: False
    input_image:
        - crops
    input_labels:
        - poses
    input_few_shot_labels:
        - poses
    train:
        roots:
            - /home/itec/emanuele/pointstream/experiments/dataset
        batch_size: 1
        initial_sequence_length: 4
        max_sequence_length: 8
        augmentations:
            horizontal_flip: True
    val:
        roots:
            - /home/itec/emanuele/pointstream/experiments/dataset
        batch_size: 1
        augmentations:
            horizontal_flip: True

test_data:
    name: tennis
    type: imaginaire.datasets.tennis_pose
    num_frames_G: 2
    num_frames_D: 2
    initial_few_shot_K: 1
    num_workers: 0
    has_foreground: True
    paired: True
    output_h_w: 512, 512
    input_types:
        - crops:
            ext: png
            num_channels: 3
            normalize: True
        - poses:
            ext: png
            num_channels: 3
            is_mask: True
            normalize: False
    input_image:
        - crops
    input_labels:
        - poses
    test:
        roots:
            - /home/itec/emanuele/pointstream/experiments/dataset
        batch_size: 1
        initial_sequence_length: 4
        max_sequence_length: 8
        augmentations:
            horizontal_flip: True

checkpoint:
    pretrained_weight: null

inference_args:
    driving_seq_index: 0
    few_shot_seq_index: 0
    few_shot_frame_index: 0

init:
    type: kaiming
    gain: 0.02
